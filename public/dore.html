<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الطلاب بالبطاقات - أكاديمية الرواد</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #06d6a0;
            --warning-color: #ffb703;
            --danger-color: #e63946;
            --dark-color: #1e1e2f;
            --light-color: #f8f9fa;
            --gray-color: #6c757d;
            --card-bg: rgba(255, 255, 255, 0.95);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-success: linear-gradient(135deg, #06d6a0 0%, #118ab2 100%);
            --gradient-warning: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            --gradient-danger: linear-gradient(135deg, #e63946 0%, #9d0208 100%);
            --box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --border-radius: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--gradient-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path fill="white" d="M50 0 L100 50 L50 100 L0 50 Z"/></svg>');
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
        }
        
        @keyframes moveBackground {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 50px) rotate(10deg); }
        }
        
        .container-fluid {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            width: 100%;
        }
        
        /* بطاقة المسح الرئيسية */
        .scan-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* الهيدر */
        .scan-header {
            background: var(--gradient-primary);
            color: white;
            padding: 25px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .scan-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .school-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .school-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .school-slogan {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }
        
        /* الوقت والتاريخ */
        .datetime-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .current-time {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }
        
        .current-date {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        /* منطقة المسح */
        .scan-area {
            padding: 30px;
            background: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .scan-input-wrapper {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .scan-input {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.2rem;
            text-align: center;
            border: 3px solid #e9ecef;
            border-radius: 50px;
            background: white;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 2px;
        }
        
        .scan-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 5px rgba(67, 97, 238, 0.2);
            outline: none;
        }
        
        .scan-input::placeholder {
            color: #adb5bd;
            letter-spacing: normal;
        }
        
        .scan-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--primary-color);
            animation: scan 1.5s infinite;
        }
        
        @keyframes scan {
            0% { opacity: 0.5; transform: translateY(-50%) scale(1); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
            100% { opacity: 0.5; transform: translateY(-50%) scale(1); }
        }
        
        /* مؤشر الحالة */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 20px 0;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .status-indicator i {
            font-size: 1.3rem;
            margin-left: 10px;
        }
        
        .status-ready {
            color: var(--success-color);
            border: 2px solid var(--success-color);
        }
        
        .status-scanning {
            color: var(--warning-color);
            border: 2px solid var(--warning-color);
            animation: pulse 1.5s infinite;
        }
        
        .status-success {
            color: var(--success-color);
            border: 2px solid var(--success-color);
            background: rgba(6, 214, 160, 0.1);
        }
        
        .status-error {
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
            background: rgba(230, 57, 70, 0.1);
        }
        
        /* الأزرار */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .btn-action {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        
        .btn-action i {
            font-size: 1.2rem;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .btn-primary-custom {
            background: var(--gradient-primary);
            color: white;
        }
        
        .btn-success-custom {
            background: var(--gradient-success);
            color: white;
        }
        
        .btn-warning-custom {
            background: var(--gradient-warning);
            color: white;
        }
        
        /* منطقة النتائج */
        .result-area {
            padding: 30px;
            min-height: 300px;
            background: white;
        }
        
        .result-card {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            animation: slideIn 0.4s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .result-header {
            padding: 20px;
            color: white;
            text-align: center;
        }
        
        .result-header.success {
            background: var(--gradient-success);
        }
        
        .result-header.warning {
            background: var(--gradient-warning);
        }
        
        .result-header.error {
            background: var(--gradient-danger);
        }
        
        .result-body {
            padding: 25px;
            background: white;
        }
        
        /* بطاقة الطالب */
        .student-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .student-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-color);
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .student-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--dark-color);
            margin-bottom: 5px;
        }
        
        .student-id {
            font-size: 1.1rem;
            color: var(--gray-color);
            margin-bottom: 15px;
            padding: 5px 15px;
            background: var(--light-color);
            border-radius: 50px;
            display: inline-block;
        }
        
        .student-info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .info-item {
            background: var(--light-color);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .info-label {
            font-size: 0.9rem;
            color: var(--gray-color);
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-color);
        }
        
        /* شريط التقدم */
        .progress-section {
            margin: 20px 0;
        }
        
        .progress {
            height: 10px;
            border-radius: 5px;
            background: #e9ecef;
        }
        
        .progress-bar {
            background: var(--gradient-primary);
            border-radius: 5px;
            transition: width 0.3s ease;
        }
        
        /* قائمة الحصص */
        .classes-list {
            margin-top: 20px;
        }
        
        .class-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
            transition: all 0.3s ease;
        }
        
        .class-item:hover {
            background: var(--light-color);
            transform: translateX(-5px);
        }
        
        .class-item:last-child {
            border-bottom: none;
        }
        
        .class-info {
            flex: 1;
        }
        
        .class-name {
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 3px;
        }
        
        .class-time {
            font-size: 0.9rem;
            color: var(--gray-color);
        }
        
        .class-status {
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-active {
            background: rgba(6, 214, 160, 0.1);
            color: var(--success-color);
        }
        
        .status-soon {
            background: rgba(255, 183, 3, 0.1);
            color: var(--warning-color);
        }
        
        .status-late {
            background: rgba(230, 57, 70, 0.1);
            color: var(--danger-color);
        }
        
        /* قائمة المسحات الحديثة */
        .recent-scans {
            background: var(--light-color);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .recent-scans-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .recent-scans-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .recent-scan-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
            animation: fadeIn 0.3s ease-out;
        }
        
        .recent-scan-item:last-child {
            border-bottom: none;
        }
        
        .scan-time {
            font-size: 0.85rem;
            color: var(--gray-color);
        }
        
        .scan-badge {
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge-success {
            background: rgba(6, 214, 160, 0.1);
            color: var(--success-color);
        }
        
        .badge-warning {
            background: rgba(255, 183, 3, 0.1);
            color: var(--warning-color);
        }
        
        .badge-danger {
            background: rgba(230, 57, 70, 0.1);
            color: var(--danger-color);
        }
        
        /* تذييل الصفحة */
        .footer {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 15px;
            text-align: center;
            color: white;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        
        /* رسائل التنبيه */
        .alert-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            min-width: 300px;
            max-width: 500px;
            padding: 15px 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        
        .alert-success {
            border-right: 5px solid var(--success-color);
        }
        
        .alert-error {
            border-right: 5px solid var(--danger-color);
        }
        
        .alert-warning {
            border-right: 5px solid var(--warning-color);
        }
        
        /* مؤشر التحميل */
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(67, 97, 238, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* تصميم متجاوب */
        @media (max-width: 768px) {
            .school-name {
                font-size: 1.4rem;
            }
            
            .current-time {
                font-size: 2rem;
            }
            
            .scan-input {
                padding: 15px 20px;
                font-size: 1rem;
            }
            
            .student-name {
                font-size: 1.5rem;
            }
            
            .student-info-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* تأثيرات إضافية */
        .glow {
            animation: glow 2s infinite;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(67, 97, 238, 0.5); }
            50% { box-shadow: 0 0 20px rgba(67, 97, 238, 0.8); }
            100% { box-shadow: 0 0 5px rgba(67, 97, 238, 0.5); }
        }
        
        .shake {
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .bounce {
            animation: bounce 1s;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        
        /* تخصيص شريط التمرير */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <!-- بطاقة المسح الرئيسية -->
                <div class="scan-card">
                    <!-- الهيدر -->
                    <div class="scan-header">
                        <div class="d-flex justify-content-center">
                            <img src="https://ui-avatars.com/api/?name=Redox+Academy&background=4361ee&color=fff&size=100" 
                                 alt="شعار الأكاديمية" 
                                 class="school-logo">
                        </div>
                        <h1 class="school-name">أكاديمية الرواد للتعليم والمعارف</h1>
                        <p class="school-slogan">نظام تسجيل الطلاب بالبطاقات الذكية</p>
                        
                        <!-- الوقت والتاريخ -->
                        <div class="datetime-section">
                            <div class="current-time" id="currentTime">
                                <i class="bi bi-clock"></i>
                                <span id="timeDisplay">--:--:--</span>
                            </div>
                            <div class="current-date" id="currentDate">
                                <i class="bi bi-calendar"></i>
                                <span id="dateDisplay">---</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- منطقة المسح -->
                    <div class="scan-area">
                        <div class="text-center mb-4">
                            <div class="status-indicator status-ready" id="scannerStatus">
                                <i class="bi bi-check-circle"></i>
                                <span>جاهز لمسح البطاقة</span>
                            </div>
                        </div>
                        
                        <div class="scan-input-wrapper">
                            <input type="text" 
                                   class="scan-input" 
                                   id="cardInput" 
                                   placeholder="امسح البطاقة أو أدخل الرقم يدوياً"
                                   autocomplete="off"
                                   autofocus>
                            <i class="bi bi-qr-code-scan scan-icon"></i>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn-action btn-primary-custom" onclick="focusScanner()">
                                <i class="bi bi-upc-scan"></i>
                                <span>تركيز الماسح</span>
                            </button>
                            <button class="btn-action btn-success-custom" onclick="manualEntry()">
                                <i class="bi bi-pencil-square"></i>
                                <span>إدخال يدوي</span>
                            </button>
                            <button class="btn-action btn-warning-custom" onclick="clearScanner()">
                                <i class="bi bi-arrow-clockwise"></i>
                                <span>إعادة تعيين</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- منطقة النتائج -->
                    <div class="result-area" id="resultArea">
                        <div class="text-center text-muted py-5" id="defaultMessage">
                            <i class="bi bi-credit-card-2-front display-1"></i>
                            <h4 class="mt-3">بانتظار مسح البطاقة</h4>
                            <p>سيتم عرض معلومات الطالب هنا بعد مسح البطاقة</p>
                        </div>
                        
                        <!-- هنا يتم عرض نتائج المسح ديناميكياً -->
                        <div id="scanResult"></div>
                    </div>
                    
                    <!-- قائمة المسحات الحديثة -->
                    <div class="recent-scans">
                        <div class="recent-scans-title">
                            <i class="bi bi-clock-history"></i>
                            <span>آخر عمليات المسح</span>
                        </div>
                        <div class="recent-scans-list" id="recentScansList">
                            <div class="recent-scan-item text-muted">
                                <span>لا توجد عمليات مسح حديثة</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- تذييل الصفحة -->
                    <div class="footer">
                        <p class="mb-0">
                            <i class="bi bi-c-circle"></i>
                            2026 Redox Academy - جميع الحقوق محفوظة
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Moment.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/ar.js"></script>
    
    <!-- ملف JavaScript الرئيسي -->
    <script >

// ==============================================
// نظام تسجيل الطلاب بالبطاقات
// الإصدار: 2.0
// ==============================================

// المتغيرات العامة
let socket;
let recentScans = [];
let isScanning = false;
let scanBuffer = '';
let lastKeyTime = Date.now();
let currentStudent = null;
let currentLiveClass = null;
let audioEnabled = true;

// تهيئة التطبيق
document.addEventListener('DOMContentLoaded', function() {
    initApp();
});

// ==============================================
// دوال التهيئة
// ==============================================

function initApp() {
    console.log('🚀 تهيئة نظام تسجيل الطلاب...');
    
    // تحديث الوقت والتاريخ
    updateDateTime();
    setInterval(updateDateTime, 1000);
    
    // الاتصال بالخادم
    connectToServer();

    // تحميل المسحات الحديثة
    loadRecentScans();
    
    // التحقق من حالة البطارية
    checkBatteryStatus();
    
    // تشغيل صوت الترحيب
    playWelcomeSound();
}

// تحديث الوقت والتاريخ
function updateDateTime() {
    const now = new Date();
    
    // تنسيق الوقت
    const timeString = now.toLocaleTimeString('ar-EG', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
    });
    
    // تنسيق التاريخ
    const dateString = now.toLocaleDateString('ar-EG', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
    
    document.getElementById('timeDisplay').textContent = timeString;
    document.getElementById('dateDisplay').textContent = dateString;
}

// الاتصال بالخادم
function connectToServer() {
    try {
        socket = io(window.location.origin, {
            transports: ['websocket', 'polling'],
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionDelayMax: 5000,
            reconnectionAttempts: 5
        });
        
        socket.on('connect', function() {
            console.log('✅ متصل بالخادم');
            updateStatus('متصل', 'status-ready', 'bi-wifi');
            showToast('success', 'تم الاتصال بالخادم بنجاح');
        });
        
        socket.on('disconnect', function() {
            console.log('❌ غير متصل بالخادم');
            updateStatus('غير متصل', 'status-error', 'bi-wifi-off');
            showToast('error', 'انقطع الاتصال بالخادم');
        });
        
        socket.on('student-detected', function(data) {
            handleStudentDetection(data);
        });
        
        socket.on('unknown-card', function(data) {
            handleUnknownCard(data);
        });
        
        socket.on('card-error', function(data) {
            handleCardError(data);
        });
        
        socket.on('attendance-registered', function(data) {
            handleAttendanceRegistered(data);
        });
        
    } catch (error) {
        console.error('❌ خطأ في الاتصال:', error);
        updateStatus('خطأ في الاتصال', 'status-error', 'bi-exclamation-triangle');
    }
}

// تهيئة نظام المسح
function setupScanner() {
    const cardInput = document.getElementById('cardInput');
    
    // معالجة الإدخال المباشر
    cardInput.addEventListener('input', function(e) {
        const value = e.target.value.trim();
        if (value.length >= 6) {
            processCard(value);
        }
    });
    
    // معالجة ضغط Enter
    cardInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const value = e.target.value.trim();
            if (value) {
                processCard(value);
            }
        }
    });
    
    // محاكاة قارئ البطاقات (قراءة سريعة)
    document.addEventListener('keydown', function(event) {
        // تجاهل إذا كان المستخدم يكتب في حقل آخر
        if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
            return;
        }
        
        const currentTime = Date.now();
        const key = event.key;
        
        // إعادة تعيين المخزن المؤقت إذا مر وقت طويل
        if (currentTime - lastKeyTime > 100) {
            scanBuffer = '';
        }
        
        lastKeyTime = currentTime;
        
        // إذا كان Enter، معالجة البطاقة
        if (key === 'Enter' && scanBuffer.length > 0) {
            event.preventDefault();
            processCard(scanBuffer);
            scanBuffer = '';
            cardInput.value = '';
        }
        // إذا كان رقم، إضافته للمخزن المؤقت
        else if (key >= '0' && key <= '9') {
            scanBuffer += key;
            cardInput.value = scanBuffer;
        }
    });
}

// ==============================================
// دوال معالجة البطاقة
// ==============================================

async function processCard(cardUid) {
    if (isScanning) {
        console.log('⏳ جاري معالجة بطاقة أخرى...');
        return;
    }
    
    try {
        isScanning = true;
        
        // تحديث الحالة
        updateStatus('جاري التعرف على البطاقة...', 'status-scanning', 'bi-arrow-repeat');
        
        // تشغيل صوت المسح
        playScanSound();
        
        // إظهار مؤشر التحميل
        showLoadingState();
        
        // تنظيف رقم البطاقة
        const cleanUid = cardUid.trim();
        
        console.log('🔍 معالجة البطاقة:', cleanUid);
        
        // إرسال طلب التسجيل السريع
        const response = await fetch('/api/attendance/quick-register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ cardUid: cleanUid })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            throw new Error(data.error || 'حدث خطأ غير متوقع');
        }
        
        if (data.success) {
            // نجاح تسجيل الحضور
            handleSuccessfulAttendance(data);
            
            // إضافة للمسحات الحديثة
            addToRecentScans({
                type: 'success',
                student: data.data.student,
                class: data.data.class,
                timestamp: new Date(),
                status: data.data.attendance.status
            });
            
            // تشغيل صوت النجاح
            playSuccessSound();
            
        } else {
            // فشل في التسجيل
            handleFailedAttendance(data);
        }
        
    } catch (error) {
        console.error('❌ خطأ في معالجة البطاقة:', error);
        
        // محاولة الطريقة التقليدية
        await processCardTraditional(cardUid);
        
    } finally {
        isScanning = false;
        
        // إعادة تعيين الحالة بعد 3 ثوان
        setTimeout(() => {
            updateStatus('جاهز لمسح البطاقة', 'status-ready', 'bi-check-circle');
        }, 3000);
        
        // تفريغ حقل الإدخال
        document.getElementById('cardInput').value = '';
        document.getElementById('cardInput').focus();
    }
}

// الطريقة التقليدية (القديمة)
async function processCardTraditional(cardUid) {
    try {
        console.log('🔄 محاولة الطريقة التقليدية...');
        
        // البحث عن البطاقة
        const cardResponse = await fetch(`/api/cards/uid/${cardUid}`);
        
        if (!cardResponse.ok) {
            if (cardResponse.status === 404) {
                // بطاقة غير معروفة
                handleUnknownCard({ uid: cardUid });
                return;
            }
            throw new Error('خطأ في استجابة الخادم');
        }
        
        const cardData = await cardResponse.json();
        
        if (cardData.student) {
            // جلب معلومات الطالب
            const studentResponse = await fetch(`/api/students/${cardData.student._id}`);
            
            if (studentResponse.ok) {
                const student = await studentResponse.json();
                
                // عرض معلومات الطالب
                displayStudentInfo(student, cardUid);
                
                // إضافة للمسحات الحديثة
                addToRecentScans({
                    type: 'info',
                    student: student,
                    cardUid: cardUid,
                    timestamp: new Date()
                });
                
                // البحث عن الحصة المناسبة
                await findAndRegisterForClass(student._id, cardUid);
            }
        }
        
    } catch (error) {
        console.error('❌ خطأ في الطريقة التقليدية:', error);
        showErrorResult(error.message);
    }
}

// البحث عن الحصة المناسبة وتسجيل الغياب
async function findAndRegisterForClass(studentId, cardUid) {
    try {
        updateStatus('جاري البحث عن الحصة المناسبة...', 'status-scanning', 'bi-search');
        
        // الحصول على الحصص المتاحة للطالب
        const availableResponse = await fetch(`/api/attendance/available-class/${studentId}`);
        
        if (!availableResponse.ok) {
            throw new Error('فشل في جلب الحصص المتاحة');
        }
        
        const availableData = await availableResponse.json();
        
        if (!availableData.recommendedClass) {
            showNoClassMessage(availableData.availableClasses);
            return;
        }
        
        const recommendedClass = availableData.recommendedClass;
        
        // تحديث الحالة
        updateStatus('جاري تسجيل الحضور...', 'status-scanning', 'bi-cloud-upload');
        
        // تحديد حالة الحضور
        const attendanceStatus = recommendedClass.timeInfo.isActive ? 
            (recommendedClass.timeInfo.minutesSinceStart > 15 ? 'late' : 'present') : 
            'present';
        
        // البحث عن حصة حية أو إنشائها
        const today = new Date().toISOString().split('T')[0];
        
        // البحث عن حصة حية
        let liveClassResponse = await fetch(`/api/live-classes?class=${recommendedClass.class._id}&date=${today}`);
        let liveClasses = await liveClassResponse.json();
        
        let liveClassId;
        
        if (liveClasses && liveClasses.length > 0) {
            liveClassId = liveClasses[0]._id;
        } else {
            // إنشاء حصة حية جديدة
            const createResponse = await fetch('/api/live-classes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    class: recommendedClass.class._id,
                    date: new Date(),
                    startTime: recommendedClass.schedule.time,
                    endTime: `${parseInt(recommendedClass.schedule.time.split(':')[0]) + 2}:00`,
                    status: 'ongoing',
                    month: new Date().toISOString().slice(0, 7)
                })
            });
            
            if (createResponse.ok) {
                const newLiveClass = await createResponse.json();
                liveClassId = newLiveClass._id;
            } else {
                throw new Error('فشل في إنشاء الحصة الحية');
            }
        }
        
        if (liveClassId) {
            // تسجيل الحضور
            const attendanceResponse = await fetch(`/api/live-classes/${liveClassId}/attendance`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    studentId: studentId,
                    status: attendanceStatus,
                    method: 'rfid',
                    sendSMS: true
                })
            });
            
            if (attendanceResponse.ok) {
                const attendanceData = await attendanceResponse.json();
                
                // عرض نجاح التسجيل
                showAttendanceSuccess(attendanceData, recommendedClass);
                
                // إضافة للمسحات الحديثة
                addToRecentScans({
                    type: 'success',
                    student: { name: attendanceData.student?.name },
                    class: recommendedClass.class.name,
                    status: attendanceStatus,
                    timestamp: new Date()
                });
                
                // تشغيل صوت النجاح
                playSuccessSound();
            }
        }
        
    } catch (error) {
        console.error('❌ خطأ في تسجيل الحضور:', error);
        showErrorResult('فشل في تسجيل الحضور: ' + error.message);
    }
}

function addToRecentScans(scan) {
    // إضافة المسح الجديد
    recentScans.unshift({
        ...scan,
        timestamp: scan.timestamp || new Date()
    });
    
    // الاحتفاظ بآخر 10 مسحات
    if (recentScans.length > 10) {
        recentScans.pop();
    }
    
    // حفظ في التخزين المحلي
    localStorage.setItem('studentCardRecentScans', JSON.stringify(recentScans));
    
    // تحديث العرض
    updateRecentScansList();
}

function updateRecentScansList() {
    const listElement = document.getElementById('recentScansList');
    
    if (recentScans.length === 0) {
        listElement.innerHTML = `
            <div class="recent-scan-item text-muted">
                <span>لا توجد عمليات مسح حديثة</span>
            </div>
        `;
        return;
    }
    
    listElement.innerHTML = recentScans.map(scan => {
        const timeString = new Date(scan.timestamp).toLocaleTimeString('ar-EG');
        const statusClass = scan.type === 'success' ? 'badge-success' : 
                           scan.type === 'warning' ? 'badge-warning' : 'badge-danger';
        const statusText = scan.type === 'success' ? 'تم التسجيل' : 
                          scan.type === 'warning' ? 'تحذير' : 'خطأ';
        
        return `
            <div class="recent-scan-item animate__animated animate__fadeIn">
                <div>
                    <strong>${scan.student?.name || 'طالب'}</strong>
                    ${scan.class ? `<br><small>${scan.class}</small>` : ''}
                </div>
                <div class="text-end">
                    <span class="scan-badge ${statusClass}">${statusText}</span>
                    <br>
                    <small class="scan-time">${timeString}</small>
                </div>
            </div>
        `;
    }).join('');
}

function loadRecentScans() {
    const saved = localStorage.getItem('studentCardRecentScans');
    if (saved) {
        try {
            recentScans = JSON.parse(saved);
            updateRecentScansList();
        } catch (e) {
            console.error('خطأ في تحميل المسحات الحديثة:', e);
        }
    }
}

// ==============================================
// دوال الحالة
// ==============================================

function updateStatus(text, statusClass, icon) {
    const statusElement = document.getElementById('scannerStatus');
    statusElement.className = `status-indicator ${statusClass}`;
    statusElement.innerHTML = `
        <i class="bi ${icon}"></i>
        <span>${text}</span>
    `;
}

function focusScanner() {
    document.getElementById('cardInput').focus();
    showToast('info', 'الماسح الضوئي جاهز');
}

function clearScanner() {
    document.getElementById('cardInput').value = '';
    document.getElementById('defaultMessage').style.display = 'block';
    document.getElementById('scanResult').innerHTML = '';
    document.getElementById('cardInput').focus();
    updateStatus('جاهز لمسح البطاقة', 'status-ready', 'bi-check-circle');
}

function manualEntry() {
    const cardInput = document.getElementById('cardInput');
    cardInput.value = '';
    cardInput.focus();
    showToast('info', 'يمكنك إدخال رقم البطاقة يدوياً');
}

function getAcademicYearName(code) {
    if (!code || code === 'NS' || code === 'غير محدد') return 'غير محدد';
    
    const years = {
        '1AS': 'الأولى ثانوي',
        '2AS': 'الثانية ثانوي',
        '3AS': 'الثالثة ثانوي',
        '1MS': 'الأولى متوسط',
        '2MS': 'الثانية متوسط',
        '3MS': 'الثالثة متوسط',
        '4MS': 'الرابعة متوسط',
        '5MS': 'الخامسة متوسط',
        '1AP': 'الأولى ابتدائي',
        '2AP': 'الثانية ابتدائي',
        '3AP': 'الثالثة ابتدائي',
        '4AP': 'الرابعة ابتدائي',
        '5AP': 'الخامسة ابتدائي'
    };
    
    return years[code] || code;
}

function showToast(type, message) {
    // إنشاء عنصر التنبيه
    const toast = document.createElement('div');
    toast.className = `alert-message alert-${type} animate__animated animate__fadeInDown`;
    toast.innerHTML = `
        <i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 
                        type === 'error' ? 'bi-x-circle-fill' : 'bi-info-circle-fill'}"></i>
        <span>${message}</span>
    `;
    
    document.body.appendChild(toast);
    
    // إزالة بعد 3 ثوان
    setTimeout(() => {
        toast.classList.add('animate__fadeOutUp');
        setTimeout(() => toast.remove(), 500);
    }, 3000);
}

function playScanSound() {
    if (!audioEnabled) return;
    
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.type = 'sine';
        oscillator.frequency.value = 800;
        gainNode.gain.value = 0.1;
        
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.3);
        oscillator.stop(audioContext.currentTime + 0.3);
    } catch (e) {
        console.log('⚠️ الصوت غير متاح');
    }
}

function checkBatteryStatus() {
    if ('getBattery' in navigator) {
        navigator.getBattery().then(function(battery) {
            console.log(`🔋 مستوى البطارية: ${battery.level * 100}%`);
            
            battery.addEventListener('levelchange', function() {
                console.log(`🔋 تغير مستوى البطارية: ${battery.level * 100}%`);
                if (battery.level < 0.2) {
                    showToast('warning', '⚠️ مستوى البطارية منخفض');
                }
            });
        });
    }
}

function registerNewCard(cardUid) {

}

function printReceipt(liveClassId) {

}

// معالجة أحداث Socket.io
// ==============================================

function handleStudentDetection(data) {
    console.log('👤 تم اكتشاف طالب:', data);
    
    if (data.student) {
        addToRecentScans({
            type: 'info',
            student: data.student,
            timestamp: new Date()
        });
        
        if (data.currentClass) {
            showAttendanceSuccess({
                student: data.student,
                attendance: { status: 'present' }
            }, { class: data.currentClass });
        }
    }
}

});

    showToast('error', 'انقطع الاتصال بالإنترنت');
    updateStatus('غير متصل', 'status-error', 'bi-wifi-off');
});

// تفعيل/تعطيل الأصوات
document.addEventListener('keydown', function(e) {
    // Ctrl + S لتفعيل/تعطيل الأصوات
    if (e.ctrlKey && e.key === 's') {
        e.preventDefault();
        audioEnabled = !audioEnabled;
        showToast('info', `الأصوات ${audioEnabled ? 'مفعّلة' : 'معطّلة'}`);
    }
});
