<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول الطلاب - نظام إدارة المدرسة</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/rtl.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      max-width: 400px;
      width: 100%;
      padding: 20px;
    }
    
    .login-card {
      background-color: var(--card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2rem;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-header h1 {
      color: var(--primary-color);
      font-size: 1.875rem;
      margin-bottom: 0.5rem;
    }
    
    .login-header p {
      color: var(--gray-color);
    }
    
    .login-logo {
      font-size: 3rem;
      color: var(--primary-color);
      margin-bottom: 1rem;
    }
    
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--gray-color);
    }
    
    .login-footer a {
      color: var(--primary-color);
      text-decoration: none;
    }
    
    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <i class="fas fa-graduation-cap"></i>
        </div>
        <h1>تسجيل دخول الطلاب</h1>
        <p>أدخل بيانات الدخول للوصول إلى حسابك</p>
      </div>
      
      <form id="login-form" onsubmit="handleStudentLogin(event)">
        <div class="form-group">
          <label class="form-label">اسم المستخدم</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required>
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">كلمة المرور</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required>
          </div>
        </div>
        
        <div class="form-group">
          <button type="submit" class="btn btn-primary w-100">
            <i class="fas fa-sign-in-alt"></i>
            تسجيل الدخول
          </button>
        </div>
      </form>
      
      <div class="login-footer">
        <p>ليس لديك حساب؟ <a href="/student/register">سجل الآن</a></p>
        <p>العودة إلى <a href="/">الصفحة الرئيسية</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    async function handleStudentLogin(event) {
      event.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showToast('يرجى إدخال اسم المستخدم وكلمة المرور', 'warning');
        return;
      }
      
      try {
        const result = await apiRequest('/api/student/login', 'POST', { username, password });
        
        if (result.token) {
          authToken = result.token;
          currentUser = result.user;
          
          localStorage.setItem('authToken', authToken);
          localStorage.setItem('currentUser', JSON.stringify(currentUser));
          
          showToast('تم تسجيل الدخول بنجاح', 'success');
          window.location.href = '/student/dashboard';
        }
      } catch (error) {
        console.error('Student login error:', error);
      }
    }
  </script>
</body>
</html>
